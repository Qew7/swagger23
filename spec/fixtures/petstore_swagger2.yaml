swagger: "2.0"
info:
  title: Petstore API
  description: |
    A minimal Petstore spec in YAML.
    Tests that YAML-specific features (anchors, multi-line strings,
    bare booleans, bare integers) are handled correctly.
  version: "1.0.0"
  contact:
    name: Petstore Team
    email: api@petstore.example.com

host: api.petstore.example.com
basePath: /v1
schemes:
  - https
  - http

consumes:
  - application/json
produces:
  - application/json

# YAML anchor: reuse a common error schema reference
x-error-ref: &error_ref
  $ref: "#/definitions/Error"

securityDefinitions:
  ApiKey:
    type: apiKey
    name: X-API-Key
    in: header
  OAuth2:
    type: oauth2
    flow: implicit
    authorizationUrl: https://auth.petstore.example.com/oauth/authorize
    scopes:
      read:pets: Read pets
      write:pets: Write pets

security:
  - ApiKey: []

parameters:
  PetId:
    name: petId
    in: path
    # No required: true here on purpose — gem should inject it
    type: integer
    format: int64

definitions:
  Pet:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
        # YAML bare boolean value
        x-nullable: false
      tag:
        type: string
        x-nullable: true          # should become nullable: true
      status:
        type: string
        enum:
          - available
          - pending
          - sold
      score:
        # YAML bare float
        type: number
        format: float
        minimum: 0.0
        maximum: 100.0

  NewPet:
    allOf:
      - $ref: "#/definitions/Pet"
      - type: object
        required:
          - name
        properties:
          ownerId:
            type: integer

  PetList:
    type: array
    items:
      $ref: "#/definitions/Pet"

  Error:
    type: object
    required:
      - code
      - message
    properties:
      code:
        type: integer
        format: int32
      message:
        type: string

paths:
  /pets:
    get:
      summary: List pets
      operationId: listPets
      tags:
        - pets
      parameters:
        - in: query
          name: limit
          type: integer
          default: 20
          maximum: 100
        - in: query
          name: status
          type: array
          items:
            type: string
          collectionFormat: multi
      responses:
        "200":
          description: A list of pets
          schema:
            $ref: "#/definitions/PetList"
          headers:
            X-Total-Count:
              type: integer
              description: Total items
        default:
          description: Unexpected error
          schema:
            $ref: "#/definitions/Error"

    post:
      summary: Create a pet
      operationId: createPet
      tags:
        - pets
      security:
        - OAuth2:
            - write:pets
        - []
      parameters:
        - in: body
          name: pet
          required: true
          description: Pet to create
          schema:
            $ref: "#/definitions/NewPet"
      responses:
        "201":
          description: Pet created
          schema:
            $ref: "#/definitions/Pet"
        "422":
          description: Validation error
          schema:
            $ref: "#/definitions/Error"

  /pets/{petId}:
    parameters:
      - $ref: "#/parameters/PetId"
    get:
      summary: Get a pet
      operationId: getPet
      tags:
        - pets
      responses:
        "200":
          description: The pet
          schema:
            $ref: "#/definitions/Pet"
        "404":
          description: Pet not found
          schema:
            $ref: "#/definitions/Error"
    delete:
      summary: Delete a pet
      operationId: deletePet
      tags:
        - pets
      x-idempotent: true
      responses:
        # YAML bare integer key
        204:
          description: Deleted
        "404":
          description: Not found

  /pets/{petId}/photo:
    post:
      summary: Upload pet photo
      operationId: uploadPetPhoto
      consumes:
        - multipart/form-data
      parameters:
        - $ref: "#/parameters/PetId"
        - in: formData
          name: photo
          type: file
          required: true
        - in: formData
          name: caption
          type: string
      responses:
        "200":
          description: Photo uploaded
